name: Build and Deploy to K3s

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: nfisu/k3s-mission-control

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t $IMAGE_NAME:latest .
          docker tag $IMAGE_NAME:latest $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}

  deploy:
    name: Deploy with Helm
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install mission-control ./mission-control \
          --set image.repository=nfisu/k3s-mission-control \
          --set image.tag=${{ github.sha }} \
          --set config.version="${{ github.sha }}" \
          --set secrets.apiKey="${{ secrets.API_KEY }}" \
          --wait \
          --timeout 3m

      - name: Show release status
        run: |
          helm list
          helm status mission-control
          kubectl get pods -l app.kubernetes.io/instance=mission-control
