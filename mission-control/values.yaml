image:
  repository: nfisu/k3s-mission-control
  tag: "latest"
  pullPolicy: Always

replicaCount: 2

strategy:
  type: RollingUpdate
  maxUnavailable: 1
  maxSurge: 1

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "200m"

service:
  type: NodePort
  port: 80
  targetPort: 3000
  nodePort: 30080

config:
  appName: "K3s Mission Control"
  appEnv: "production"
  version: "v3"
  port: "3000"

secrets:
  apiKey: "changeme"

persistence:
  enabled: true
  size: 500Mi
  mountPath: /app/data
  hostPath: /data/mission-control

ingress:
  enabled: true
  className: nginx
  host: mission-control.local
